# Piing dashboard — Nginx for dash.anthropics.ir
#
# Recommended with Cloudflare (orange cloud):
#   - This file serves HTTP on :80 only (TLS terminates at Cloudflare)
#   - Cloudflare SSL/TLS mode: Flexible  (until you install an origin cert)
#   - Or: Full / Full Strict after Let's Encrypt / Origin CA (see bottom)
#
# SSL_ERROR_RX_RECORD_TOO_LONG = browser hit :443 but got plain HTTP
#   (never enable "listen 443 ssl" without real certificate files)

upstream quadtwo_api {
    server 127.0.0.1:4000;
}

upstream quadtwo_web {
    server 127.0.0.1:3000;
}

server {
    # default_server: اگر سایت default اوبونتو هنوز فعال باشد، Host اشتباه
    # باعث 404 خودِ nginx می‌شود — این بلوک اولویت بگیرد.
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name dash.anthropics.ir _;

    client_max_body_size 20m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://quadtwo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://quadtwo_api;
        proxy_set_header Host $host;
    }

    location /telegram/ {
        proxy_pass http://quadtwo_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://quadtwo_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Optional: origin HTTPS (Cloudflare SSL = Full / Full Strict) ──────────
