# Piing dashboard — Nginx site for dash.anthropics.ir
# Cloudflare DNS: A/AAAA record → origin IP (orange cloud OK with Full SSL)

upstream quadtwo_api {
    server 127.0.0.1:4000;
}

upstream quadtwo_web {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name dash.anthropics.ir;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dash.anthropics.ir;

    # ssl_certificate     /etc/letsencrypt/live/dash.anthropics.ir/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dash.anthropics.ir/privkey.pem;
    # Or terminate TLS at Cloudflare and proxy HTTP to origin on 80/443.

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://quadtwo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://quadtwo_api;
        proxy_set_header Host $host;
    }

    location /telegram/ {
        proxy_pass http://quadtwo_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://quadtwo_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
