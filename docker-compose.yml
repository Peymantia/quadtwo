# v1 uses SQLite inside the server container/volume (see DATABASE_URL in .env).
services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "4000"
      BOT_MODE: webhook
      DATABASE_URL: file:/data/quadtwo.db
    volumes:
      - server_data:/data
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  server_data:
